services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-aigc}
      MYSQL_USER: ${MYSQL_USER:-aigc}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-aigc_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -u\"$${MYSQL_USER}\" -p\"$${MYSQL_PASSWORD}\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:4.3.0-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-aigc}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-aigc_password}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:-mysql://${MYSQL_USER:-aigc}:${MYSQL_PASSWORD:-aigc_password}@mysql:3306/${MYSQL_DATABASE:-aigc}}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://${RABBITMQ_DEFAULT_USER:-aigc}:${RABBITMQ_DEFAULT_PASS:-aigc_password}@rabbitmq:5672/}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-replace-me}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_DAYS: ${JWT_REFRESH_EXPIRES_DAYS:-30}
      SSE_TICKET_SECRET: ${SSE_TICKET_SECRET:-replace-me}
      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT:-http://minio:9000}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-aigc-assets}
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY:-minioadmin}
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY:-minioadmin}
      OBJECT_STORAGE_SECURE: ${OBJECT_STORAGE_SECURE:-false}
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy

  ai-service:
    build:
      context: ../..
      dockerfile: apps/ai-service/Dockerfile
    ports:
      - "8000:8000"
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://api:3000/api}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://${RABBITMQ_DEFAULT_USER:-aigc}:${RABBITMQ_DEFAULT_PASS:-aigc_password}@rabbitmq:5672/}
      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT:-http://minio:9000}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-aigc-assets}
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY:-minioadmin}
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY:-minioadmin}
      OBJECT_STORAGE_SECURE: ${OBJECT_STORAGE_SECURE:-false}
    depends_on:
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_started

  admin:
    build:
      context: ../..
      dockerfile: apps/admin/Dockerfile
    ports:
      - "8081:80"
    depends_on:
      api:
        condition: service_started

  worker:
    build:
      context: ../..
      dockerfile: apps/ai-service/Dockerfile
    command: ["python", "-m", "src.worker_main"]
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://api:3000/api}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://${RABBITMQ_DEFAULT_USER:-aigc}:${RABBITMQ_DEFAULT_PASS:-aigc_password}@rabbitmq:5672/}
      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT:-http://minio:9000}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-aigc-assets}
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY:-minioadmin}
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY:-minioadmin}
      OBJECT_STORAGE_SECURE: ${OBJECT_STORAGE_SECURE:-false}
    depends_on:
      api:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  minio_data:

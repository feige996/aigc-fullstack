# Example production reverse proxy.
#
# Replace app.example.com and admin.example.com with real hostnames, then mount
# this file into an nginx container or copy the server blocks into your ingress.
# TLS termination can live here or in an upstream load balancer.

upstream aigc_api {
  server api:3000;
}

upstream aigc_web {
  server web:80;
}

upstream aigc_admin {
  server admin:80;
}

map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 80;
  server_name app.example.com;

  client_max_body_size 50m;

  location /health {
    proxy_pass http://aigc_web/health;
  }

  location /api/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_buffering off;
    proxy_read_timeout 300s;
    proxy_pass http://aigc_api;
  }

  location / {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://aigc_web;
  }
}

server {
  listen 80;
  server_name admin.example.com;

  client_max_body_size 50m;

  location /health {
    proxy_pass http://aigc_admin/health;
  }

  location /api/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_buffering off;
    proxy_read_timeout 300s;
    proxy_pass http://aigc_api;
  }

  location / {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://aigc_admin;
  }
}
